<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body { font-family: 'Poppins', sans-serif; background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('https://images.pexels.com/photos/941861/pexels-photo-941861.jpeg?auto=compress&cs=tinysrgb&w=1600'); background-size: cover; background-position: center; background-attachment: fixed; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); padding: 0; border-radius: 40px; border: 1px solid rgba(212, 175, 55, 0.3); box-shadow: 0 40px 80px rgba(0,0,0,0.6); width: 1000px; max-height: 90vh; overflow-y: auto; position: relative; }

        .auth-side-img { flex: 1; background: url('https://images.pexels.com/photos/262978/pexels-photo-262978.jpeg?auto=compress&cs=tinysrgb&w=800'); background-size: cover; background-position: center; }

        .restaurant-title { font-family: 'Playfair Display', serif; color: var(--dark); font-size: 2.5em; margin-bottom: 10px; border-left: 5px solid var(--gold); padding-left: 15px; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; outline: none; font-size: 1em; background: #fafafa; box-sizing: border-box; }
        .btn-gold { background: var(--dark); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 1.1em; }

        .item-card { background: #fff; border-radius: 25px; border: 1px solid #f0f0f0; transition: 0.4s; overflow: hidden; text-align: center; padding-bottom: 20px; }
        .btn-order { background: none; border: 2px solid var(--primary); color: var(--primary); padding: 8px 25px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .hidden { display: none; }
        .logout { margin: 20px; display: inline-block; color: #999; text-decoration: none; font-size: 0.9em; }

</head>
<body>

    <div id="auth-section" class="container">
        <div class="auth-wrapper">
            <div class="auth-side-img"></div>
            <div class="auth-content">
                <h1 id="auth-title" class="restaurant-title">Natevanın<br>Restoranı</h1>
                <p id="auth-desc" style="color: #666; margin-bottom: 30px;">Premium dadlar dünyasına xoş gəldiniz.</p>
                <input type="text" id="username" placeholder="İstifadəçi adı">
                <input type="password" id="password" placeholder="Şifrə">
                <button id="main-auth-btn" class="btn-gold" onclick="processAuth()">Daxil Ol</button>
                <p style="margin-top: 20px; font-size: 0.9em; color: #555;">
                    <span id="toggle-text">Hesabınız yoxdur?</span>
                    <button id="toggle-btn" style="background:none; border:none; color:var(--primary); cursor:pointer; font-weight:600; padding:0; margin-left:5px;" onclick="switchAuthMode()">Qeydiyyatdan keçin</button>
                </p>
            </div>
        </div>
    </div>

    <div id="menu-section" class="container hidden">
        <div class="menu-header" style="text-align: center; padding: 20px;">
            <h1 class="restaurant-title" style="border:none;">Bizim Menyu</h1>
        </div>
        <div id="foods" class="menu-grid active">
            <div class="item-card">
                <img src="https://images.pexels.com/photos/1146760/pexels-photo-1146760.jpeg?auto=compress&cs=tinysrgb&w=400" style="width:100%">
                <span class="item-name">Məxsusi Pizza</span>
                <button class="btn-order" onclick="makeOrder('Pizza')">Sifariş</button>
            </div>
            <div class="item-card">
                <img src="https://images.pexels.com/photos/1639562/pexels-photo-1639562.jpeg?auto=compress&cs=tinysrgb&w=400" style="width:100%">
                <span class="item-name">Premium Burger</span>
                <button class="btn-order" onclick="makeOrder('Burger')">Sifariş</button>
            </div>
            <div class="item-card">
                <img src="https://images.pexels.com/photos/1148086/pexels-photo-1148086.jpeg?auto=compress&cs=tinysrgb&w=400" style="width:100%">
                <span class="item-name">Sushi Set</span>
                <button class="btn-order" onclick="makeOrder('Sushi')">Sifariş</button>
            </div>
        </div>
        <div style="text-align: center;"><a href="#" class="logout" onclick="location.reload()">Çıxış</a></div>
    </div>

    <script>
        const API_URL = "http://localhost:3000";
        let authMode = "login";

        function switchAuthMode() {
            const title = document.getElementById('auth-title');
            const desc = document.getElementById('auth-desc');
            const mainBtn = document.getElementById('main-auth-btn');
            const toggleText = document.getElementById('toggle-text');
            const toggleBtn = document.getElementById('toggle-btn');
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";

            if (authMode === "login") {
                authMode = "register";
                title.innerHTML = "Yeni<br>Qeydiyyat";
                desc.innerText = "Ailəmizə qoşulmaq üçün məlumatları daxil edin.";
                mainBtn.innerText = "Qeydiyyatı Tamamla";
                toggleText.innerText = "Artıq hesabınız var?";
                toggleBtn.innerText = "Girişə qayıt";
            } else {
                authMode = "login";
                title.innerHTML = "Natevanın<br>Restoranı";
                desc.innerText = "Premium dadlar dünyasına xoş gəldiniz.";
                mainBtn.innerText = "Daxil Ol";
                toggleText.innerText = "Hesabınız yoxdur?";
                toggleBtn.innerText = "Qeydiyyatdan keçin";
            }
        }

        async function processAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(!user || !pass) return alert("Zəhmət olmasa xanaları doldurun!");

            try {
                const response = await fetch(`${API_URL}/${authMode}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (response.ok) {
                    if (authMode === 'login') {
                        document.getElementById('auth-section').classList.add('hidden');
                        document.getElementById('menu-section').classList.remove('hidden');
                        alert("Xoş gəldiniz!");
                    } else {
                        alert("Qeydiyyat uğurludur! Giriş edə bilərsiniz.");
                        switchAuthMode();
                    }
                } else {
                    alert(data.error || "Xəta baş verdi.");
                }
            } catch (e) {
                // Əgər serverin bağlıdırsa bura düşəcək
                alert("Serverə qoşulmaq mümkün olmadı (localhost:3000).");
            }
        }

        async function makeOrder(food) {
            const user = document.getElementById('username').value;
            try {
                await fetch(`${API_URL}/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, food_name: food })
                });
                alert(food + " sifariş edildi!");
            } catch (e) { alert("Sifariş xətası!"); }
        }
    </script>
</body>
</html>
